spring.application.name=barbershop

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/barbershop}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

app.google.calendar.enabled=${APP_GOOGLE_CALENDAR_ENABLED:false}
app.google.calendar.id=${APP_GOOGLE_CALENDAR_ID:primary}
app.google.calendar.credentials-location=${APP_GOOGLE_CALENDAR_CREDENTIALS_LOCATION:file:./google-calendar-service-account.json}

app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:5173}
app.auth.email=${APP_AUTH_EMAIL:admin@barbershop.com}
app.auth.password=${APP_AUTH_PASSWORD:admin123}
app.auth.display-name=${APP_AUTH_DISPLAY_NAME:Administrador}
