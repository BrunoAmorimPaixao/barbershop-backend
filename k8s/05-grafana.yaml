apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: barbershop
data:
  prometheus.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.barbershop.svc.cluster.local:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: barbershop
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: barbershop
        orgId: 1
        folder: Barbershop
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/dashboards
---
